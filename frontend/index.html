<!DOCTYPE html>
<html lang="en" class="light">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>🤖 RAG Support Bot</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/particles.js@2.0.0/particles.min.js"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" rel="stylesheet">
    <style>
        .dark { color-scheme: dark; }
        .dark body { background: linear-gradient(to br, #0f172a 0%, #1e293b 100%); }
        .dark .bg-white/70 { background: rgba(30,41,59,0.8); }
        .dark .text-gray-900 { color: white; }
        .dark .border-gray-200 { border-color: #475569; }
        .user-bubble { background: linear-gradient(135deg, #667eea 0%, #764ba2 100%); box-shadow: 0 8px 32px rgba(102,126,234,0.4); }
        .bot-bubble { background: linear-gradient(135deg, #f093fb 0%, #f5576c 100%); box-shadow: 0 8px 32px rgba(240,147,251,0.4); }
        @keyframes fadeInUp { from { opacity: 0; transform: translateY(20px); } to { opacity: 1; transform: translateY(0); } }
        .fade-in-up { animation: fadeInUp 0.5s ease-out; }
        @keyframes pulse { 0%, 100% { opacity: 1; } 50% { opacity: 0.5; } }
        .typing-dot { animation: pulse 1.5s infinite; animation-delay: calc(var(--i) * 0.3s); }
        @keyframes bounce { 0%, 20%, 50%, 80%, 100% { transform: translateY(0); } 40% { transform: translateY(-8px); } 60% { transform: translateY(-4px); } }
        .bounce { animation: bounce 2s infinite; }
    </style>
</head>
body class="min-h-screen py-8 transition-colors duration-300 bg-gradient-to-br from-black to-slate-900"
    <!-- Particles BG -->
    <div id="particles-js" class="fixed inset-0 z-0"></div>
    
    <div class="relative z-10 max-w-4xl mx-auto bg-white/70 dark:bg-slate-800/70 backdrop-blur-xl rounded-3xl shadow-2xl p-8">
        <!-- Header -->
        <div class="text-center mb-12">
            <div class="w-24 h-24 bg-gradient-to-r from-emerald-400 to-blue-500 rounded-full mx-auto mb-6 flex items-center justify-center text-4xl shadow-2xl bounce">
                🤖
            </div>
            <h1 class="text-5xl font-bold bg-gradient-to-r from-gray-900 to-slate-700 bg-clip-text text-transparent mb-2">
                RAG Support Bot
            </h1>
            <p class="text-xl text-gray-600 mb-6">AI-powered customer support assistant</p>
            <div class="flex justify-center gap-4 mb-8">
                <div id="status" class="px-6 py-3 bg-emerald-100 dark:bg-emerald-900/50 text-emerald-800 dark:text-emerald-200 rounded-2xl font-semibold shadow-lg fade-in-up">
                    Ready to chat!
                </div>
                <button onclick="toggleTheme()" id="theme-toggle" class="p-3 bg-gray-200 hover:bg-gray-300 dark:bg-slate-700 dark:hover:bg-slate-600 rounded-2xl shadow-lg hover:shadow-xl transition-all duration-300">
                    <i class="fas fa-moon text-xl"></i>
                </button>
            </div>
        </div>
        
        <div class="grid lg:grid-cols-4 gap-8 mb-8">
            <!-- Quick Queries Sidebar -->
            <div class="lg:col-span-1 space-y-3">
                <h3 class="font-bold text-lg mb-6 flex items-center gap-2 text-gray-800 dark:text-white">
                    <i class="fas fa-lightbulb text-yellow-400"></i>Quick Queries
                </h3>
                <div class="space-y-2">
                    <button onclick="useExample('What is the refund policy?')" class="w-full p-4 bg-blue-500 hover:bg-blue-600 text-white rounded-xl shadow-lg hover:shadow-xl transition-all duration-300 text-sm font-medium">Refund Policy</button>
                    <button onclick="useExample('What are the support hours?')" class="w-full p-4 bg-emerald-500 hover:bg-emerald-600 text-white rounded-xl shadow-lg hover:shadow-xl transition-all duration-300 text-sm font-medium">Support Hours</button>
                    <button onclick="useExample('How do I return a product?')" class="w-full p-4 bg-orange-500 hover:bg-orange-600 text-white rounded-xl shadow-lg hover:shadow-xl transition-all duration-300 text-sm font-medium">Returns</button>
                    <button onclick="useExample('Warranty details')" class="w-full p-4 bg-purple-500 hover:bg-purple-600 text-white rounded-xl shadow-lg hover:shadow-xl transition-all duration-300 text-sm font-medium">Warranty</button>
                </div>
            </div>

            <!-- Chat Messages -->
            <div class="lg:col-span-3">
                <div id="messages" class="h-96 bg-white/50 dark:bg-slate-800/50 rounded-2xl p-6 overflow-y-auto shadow-inner mb-6 fade-in-up [&::-webkit-scrollbar]:hidden">
                    <div class="text-center text-gray-500 text-sm py-12 opacity-75">Welcome! Select quick query or type below ✨</div>
                </div>
            </div>
        </div>

        <!-- Input & Controls -->
        <div class="flex gap-4 p-6 bg-white/80 dark:bg-slate-800/80 backdrop-blur-xl rounded-3xl shadow-xl border border-gray-200 dark:border-slate-600">
            <button onclick="toggleVoice()" id="voice-btn" class="w-14 h-14 bg-gradient-to-r from-pink-400 to-rose-500 hover:from-pink-500 hover:to-rose-600 rounded-2xl shadow-lg hover:shadow-xl transition-all duration-300 flex items-center justify-center text-white text-xl">
                <i class="fas fa-microphone"></i>
            </button>
            <input type="text" id="user-input" placeholder="Ask about support, refunds, warranty..." class="flex-1 p-4 rounded-2xl border-2 border-gray-200 focus:border-blue-400 focus:outline-none text-lg bg-white dark:bg-slate-900 shadow-inner transition-all duration-300 hover:shadow-md" />
            <button onclick="sendChat()" class="w-16 h-16 bg-gradient-to-r from-emerald-500 to-teal-600 hover:from-emerald-600 hover:to-teal-700 rounded-2xl shadow-lg hover:shadow-xl transition-all duration-300 flex items-center justify-center text-white hover:scale-110">
                <i class="fas fa-paper-plane"></i>
            </button>
        </div>
        
        <!-- Action Buttons -->
        <div class="flex gap-4 mt-6 opacity-90">
            <button onclick="clearChat()" class="flex-1 p-4 bg-red-100 hover:bg-red-200 text-red-700 rounded-2xl font-semibold transition-all duration-300 shadow-lg hover:shadow-xl dark:bg-red-900/50 dark:text-red-300 dark:hover:bg-red-800">
                <i class="fas fa-trash mr-2"></i>Clear Chat
            </button>
            <button onclick="loadSaved()" class="flex-1 p-4 bg-blue-100 hover:bg-blue-200 text-blue-700 rounded-2xl font-semibold transition-all duration-300 shadow-lg hover:shadow-xl dark:bg-blue-900/50 dark:text-blue-300 dark:hover:bg-blue-800">
                <i class="fas fa-history mr-2"></i>Load History
            </button>
        </div>
    </div>

    <script>
        const API_URL = 'http://localhost:8000/chat';
        const messagesEl = document.getElementById('messages');
        const statusEl = document.getElementById('status');
        const userInput = document.getElementById('user-input');
        const themeToggle = document.getElementById('theme-toggle');
        const htmlEl = document.documentElement;
        let voiceRecognition;
        let isConnected = false;

        // Initialize theme
        if (localStorage.getItem('theme') === 'dark' || (!localStorage.getItem('theme') && window.matchMedia('(prefers-color-scheme: dark)').matches)) {
            htmlEl.classList.add('dark');
            themeToggle.querySelector('i').className = 'fas fa-sun';
        }

        function toggleTheme() {
            htmlEl.classList.toggle('dark');
            const isDark = htmlEl.classList.contains('dark');
            localStorage.setItem('theme', isDark ? 'dark' : 'light');
            themeToggle.querySelector('i').className = isDark ? 'fas fa-sun' : 'fas fa-moon';
        }

        // Particles premium config
        particlesJS("particles-js", {
            particles: {
                number: { value: 60 },
                color: { value: ["#667eea", "#764ba2"] },
                shape: { type: "circle" },
                opacity: { value: 0.5, random: true },
                size: { value: 5, random: true },
                line_linked: { enable: true, distance: 200, color: "#667eea", opacity: 0.3, width: 1 },
                move: { enable: true, speed: 3, direction: "none", random: true }
            },
            interactivity: {
                events: { onhover: { enable: true, mode: "repulse" }, onclick: { enable: true, mode: "push" } },
                modes: { repulse: { distance: 100, duration: 0.4 }, push: { particles_nb: 4 } }
            }
        });

        // Voice support
        if ('webkitSpeechRecognition' in window) {
            voiceRecognition = new (window.webkitSpeechRecognition || window.SpeechRecognition)();
            voiceRecognition.continuous = false;
            voiceRecognition.interimResults = false;
            voiceRecognition.lang = 'en-US';
        }

        function toggleVoice() {
            if (voiceRecognition) {
                voiceRecognition.start();
                statusEl.textContent = 'Listening... 🎤';
            } else {
                statusEl.textContent = 'Voice not supported';
            }
        }

        voiceRecognition?.addEventListener('result', (e) => {
            userInput.value = e.results[0][0].transcript;
            statusEl.textContent = 'Voice ready!';
        });

        async function sendChat() {
            const message = userInput.value.trim();
            if (!message) return;

            // Add user message
            appendMessage('user', message);
            userInput.value = '';
            showTyping();

            try {
                const response = await fetch(API_URL, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ query: message })
                });
                
                const data = await response.json();
                hideTyping();
                const displayText = data.decision === 'ANSWER' ? data.answer : data.answer + ' (Escalated to human)';
                appendMessage('bot', displayText);
                statusEl.textContent = 'Ready!';
            } catch (error) {
                hideTyping();
                appendMessage('bot', 'Sorry, connection error. Backend running?');
                statusEl.textContent = 'Error';
            }
        }

        function appendMessage(sender, text) {
            const div = document.createElement('div');
            div.className = `mb-6 fade-in-up ${sender === 'user' ? 'text-right' : 'text-left'}`;
            const time = new Date().toLocaleTimeString([],{hour: '2-digit', minute: '2-digit'});
            div.innerHTML = `
                <div class="inline-flex flex-col ${sender === 'user' ? 'items-end' : 'items-start'}">
                    <div class="flex items-start gap-3">
                        <div class="w-12 h-12 rounded-full flex items-center justify-center shadow-lg ${sender === 'user' ? 'bg-gradient-to-r from-orange-400 to-red-500 order-2 ml-3' : 'bg-gradient-to-r from-purple-400 to-pink-500 order-1 mr-3'} text-white font-bold text-sm">
                            ${sender === 'user' ? '👤' : '🤖'}
                        </div>
                        <div class="max-w-xs lg:max-w-md p-4 rounded-3xl shadow-2xl ${sender === 'user' ? 'user-bubble rounded-br-sm ml-auto' : 'bot-bubble rounded-bl-sm mr-auto'} text-white font-medium leading-relaxed">
                            ${text}
                        </div>
                    </div>
                    <span class="text-xs text-gray-500 mt-1">${time}</span>
                </div>
            `;
            messagesEl.appendChild(div);
            messagesEl.scrollTop = messagesEl.scrollHeight;
        }

        function showTyping() {
            if (document.getElementById('typing')) return;
            const div = document.createElement('div');
            div.id = 'typing';
            div.className = 'flex justify-start mb-6 fade-in-up';
            div.innerHTML = `
                <div class="flex items-center gap-3">
                    <div class="w-12 h-12 bg-gradient-to-r from-emerald-400 to-teal-500 rounded-full flex items-center justify-center shadow-lg text-white">
                        🤖
                    </div>
                    <div class="flex gap-1">
                        <div class="typing-dot w-3 h-3 bg-blue-400 rounded-full" style="--i: 1;"></div>
                        <div class="typing-dot w-3 h-3 bg-blue-400 rounded-full" style="--i: 2;"></div>
                        <div class="typing-dot w-3 h-3 bg-blue-400 rounded-full" style="--i: 3;"></div>
                    </div>
                </div>
            `;
            messagesEl.appendChild(div);
            messagesEl.scrollTop = messagesEl.scrollHeight;
        }

        function hideTyping() {
            const typing = document.getElementById('typing');
            if (typing) typing.remove();
        }

        function useExample(query) {
            userInput.value = query;
            userInput.focus();
            statusEl.textContent = `Example loaded: "${query}"`;
        }

        function clearChat() {
            messagesEl.innerHTML = '<div class="text-center text-gray-500 py-12 opacity-75 text-lg">Chat cleared! Start fresh ✨</div>';
            statusEl.textContent = 'Fresh start!';
        }

        function loadSaved() {
            const history = JSON.parse(localStorage.getItem('rag-bot-history') || '[]');
            if (history.length) {
                messagesEl.innerHTML = '';
                history.slice(-8).forEach(item => {
                    appendMessage('user', item.query);
                    appendMessage('bot', item.response);
                });
                statusEl.textContent = `Loaded ${history.length} messages`;
            } else {
                statusEl.textContent = 'No saved history';
            }
        }

        // Save history
        function saveHistory(query, response) {
            const history = JSON.parse(localStorage.getItem('rag-bot-history') || '[]');
            history.push({ query, response, timestamp: Date.now() });
            localStorage.setItem('rag-bot-history', JSON.stringify(history.slice(-20))); // Last 20
        }

        // Events
        userInput.addEventListener('keypress', e => {
            if (e.key === 'Enter') sendChat();
        });

        userInput.focus();

        // Test connection on load
        fetch(API_URL.replace('/chat', '/'), { method: 'HEAD' }).catch(() => {
            statusEl.textContent = 'Backend not responding - start python -m uvicorn backend.app:app --reload';
        });
    </script>
</body>
</html>
